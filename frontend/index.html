<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Magneto Empleos — Iniciar sesión</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-icon">M</span>
      <h1>Magneto Empleos</h1>
      <p>Encuentra el trabajo que hace match contigo</p>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="showTab('login')">Iniciar sesión</button>
      <button class="tab" onclick="showTab('register')">Registrarse</button>
    </div>

    <!-- Login -->
    <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
      <div class="field">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="tucorreo@ejemplo.com" required />
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required />
      </div>
      <div id="loginError" class="error-msg"></div>
      <button type="submit" class="btn-primary">Entrar</button>
    </form>

    <!-- Register -->
    <form id="registerForm" class="auth-form hidden" onsubmit="handleRegister(event)">
      <div class="field">
        <label>Nombre completo</label>
        <input type="text" id="regName" placeholder="Juan Pérez" required />
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="tucorreo@ejemplo.com" required />
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres" required minlength="6" />
      </div>
      <div id="registerError" class="error-msg"></div>
      <button type="submit" class="btn-primary">Crear cuenta</button>
    </form>
  </div>

  <script src="config.js"></script>
  <script>
    // Si ya hay sesion, redirigir al dashboard
    if (getToken()) window.location.href = "dashboard.html";

    function showTab(tab) {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".auth-form").forEach(f => f.classList.add("hidden"));

      if (tab === "login") {
        document.querySelectorAll(".tab")[0].classList.add("active");
        document.getElementById("loginForm").classList.remove("hidden");
      } else {
        document.querySelectorAll(".tab")[1].classList.add("active");
        document.getElementById("registerForm").classList.remove("hidden");
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const errEl = document.getElementById("loginError");
      errEl.textContent = "";
      try {
        const data = await apiFetch("/auth/login", {
          method: "POST",
          body: JSON.stringify({
            email: document.getElementById("loginEmail").value,
            password: document.getElementById("loginPassword").value,
          }),
        });
        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));
        window.location.href = "dashboard.html";
      } catch (err) {
        errEl.textContent = err.message;
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const errEl = document.getElementById("registerError");
      errEl.textContent = "";
      try {
        const data = await apiFetch("/auth/register", {
          method: "POST",
          body: JSON.stringify({
            email: document.getElementById("regEmail").value,
            full_name: document.getElementById("regName").value,
            password: document.getElementById("regPassword").value,
          }),
        });
        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));
        window.location.href = "profile.html";
      } catch (err) {
        errEl.textContent = err.message;
      }
    }
  </script>
</body>
</html>
