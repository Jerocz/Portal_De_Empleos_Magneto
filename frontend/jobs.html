<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Magneto — Empleos</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">
      <span class="logo-icon small">M</span> Magneto Empleos
    </div>
    <div class="nav-links">
      <a href="dashboard.html">Inicio</a>
      <a href="jobs.html" class="active">Empleos</a>
      <a href="profile.html">Mi Perfil</a>
      <button class="btn-logout" onclick="logout()">Salir</button>
    </div>
  </nav>

  <div class="container">
    <h2 class="page-title">Empleos disponibles</h2>

    <!-- Filtros -->
    <div class="filters-bar">
      <input type="text" id="filterCity" placeholder="🏙️ Ciudad..." onkeyup="applyFilters()" />
      <select id="filterModality" onchange="applyFilters()">
        <option value="">Todas las modalidades</option>
        <option value="remote">Remoto</option>
        <option value="hybrid">Híbrido</option>
        <option value="on-site">Presencial</option>
      </select>
      <button class="btn-secondary" onclick="clearFilters()">Limpiar filtros</button>
    </div>

    <p id="jobCount" class="job-count"></p>

    <div id="jobsContainer">
      <div class="loading">Cargando empleos...</div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    requireAuth();
    let allJobs = [];

    async function loadJobs() {
      const container = document.getElementById("jobsContainer");
      try {
        allJobs = await apiFetch("/jobs/");
        renderJobs(allJobs);
      } catch (err) {
        container.innerHTML = `<div class="empty-state">Error: ${err.message}</div>`;
      }
    }

    function renderJobs(jobs) {
      const container = document.getElementById("jobsContainer");
      document.getElementById("jobCount").textContent = `${jobs.length} empleos encontrados`;

      if (jobs.length === 0) {
        container.innerHTML = `<div class="empty-state">No se encontraron empleos con esos filtros.</div>`;
        return;
      }

      container.innerHTML = jobs.map(j => `
        <div class="job-card">
          <div class="job-header">
            <div>
              <h3>${j.title}</h3>
              <span class="company">${j.company}</span>
            </div>
            <span class="modality-badge ${j.modality}">${labelModality(j.modality)}</span>
          </div>
          <p class="job-location">📍 ${j.city}</p>
          <p class="job-desc">${j.description || ""}</p>
          <div class="job-footer">
            <span class="salary">💰 $${j.salary_min_cop?.toLocaleString()} – $${j.salary_max_cop?.toLocaleString()} COP</span>
            <div class="skills-row">
              ${(j.skills_required || []).map(s => `<span class="skill-tag">${s}</span>`).join("")}
            </div>
          </div>
        </div>
      `).join("");
    }

    function applyFilters() {
      const city = document.getElementById("filterCity").value.toLowerCase();
      const modality = document.getElementById("filterModality").value;

      const filtered = allJobs.filter(j => {
        const matchCity = !city || j.city.toLowerCase().includes(city);
        const matchModality = !modality || j.modality === modality;
        return matchCity && matchModality;
      });

      renderJobs(filtered);
    }

    function clearFilters() {
      document.getElementById("filterCity").value = "";
      document.getElementById("filterModality").value = "";
      renderJobs(allJobs);
    }

    function labelModality(m) {
      return { remote: "Remoto", hybrid: "Híbrido", "on-site": "Presencial" }[m] || m;
    }

    loadJobs();
  </script>
</body>
</html>
