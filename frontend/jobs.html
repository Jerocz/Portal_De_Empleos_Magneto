<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Magneto - Empleos</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <nav>
    <div class="brand">Magneto Empleos</div>
    <div class="links">
      <a href="dashboard.html">Inicio</a>
      <a href="jobs.html">Empleos</a>
      <a href="profile.html">Mi Perfil</a>
      <button onclick="logout()">Salir</button>
    </div>
  </nav>

  <div class="container">

    <h2 style="margin-bottom: 14px;">Empleos disponibles</h2>

    <div class="filtros">
      <input type="text" id="filtroCity" placeholder="Ciudad..." onkeyup="filtrar()" />
      <select id="filtroMod" onchange="filtrar()">
        <option value="">Todas las modalidades</option>
        <option value="remote">Remoto</option>
        <option value="hybrid">Híbrido</option>
        <option value="on-site">Presencial</option>
      </select>
      <button class="btn btn-secondary" onclick="limpiarFiltros()">Limpiar</button>
    </div>

    <p id="contador" class="text-muted mb-10"></p>

    <div id="jobsContainer">
      <p class="text-muted">Cargando empleos...</p>
    </div>

  </div>

  <script src="config.js"></script>
  <script>
    requireAuth();
    let todosLosEmpleos = [];

    async function cargarEmpleos() {
      const cont = document.getElementById("jobsContainer");
      try {
        todosLosEmpleos = await apiFetch("/jobs/");
        mostrarEmpleos(todosLosEmpleos);
      } catch (err) {
        cont.innerHTML = `<div class="msg msg-error">Error: ${err.message}</div>`;
      }
    }

    function mostrarEmpleos(lista) {
      const cont = document.getElementById("jobsContainer");
      document.getElementById("contador").textContent = lista.length + " empleos encontrados";

      if (lista.length === 0) {
        cont.innerHTML = `<p class="text-muted">No se encontraron empleos con esos filtros.</p>`;
        return;
      }

      cont.innerHTML = lista.map(j => `
        <div class="job-card">
          <h3>${j.title}</h3>
          <span class="company">${j.company}</span>
          <p class="meta">📍 ${j.city} · ${etiquetaMod(j.modality)}</p>
          <p class="desc">${j.description || ""}</p>
          <p class="salary">💰 $${j.salary_min_cop?.toLocaleString()} – $${j.salary_max_cop?.toLocaleString()} COP</p>
          <div class="skills-row">
            ${(j.skills_required || []).map(s => `<span class="skill-tag">${s}</span>`).join("")}
          </div>
        </div>
      `).join("");
    }

    function filtrar() {
      const ciudad = document.getElementById("filtroCity").value.toLowerCase();
      const mod = document.getElementById("filtroMod").value;
      const resultado = todosLosEmpleos.filter(j => {
        const okCity = !ciudad || j.city.toLowerCase().includes(ciudad);
        const okMod = !mod || j.modality === mod;
        return okCity && okMod;
      });
      mostrarEmpleos(resultado);
    }

    function limpiarFiltros() {
      document.getElementById("filtroCity").value = "";
      document.getElementById("filtroMod").value = "";
      mostrarEmpleos(todosLosEmpleos);
    }

    function etiquetaMod(m) {
      return { remote: "Remoto", hybrid: "Híbrido", "on-site": "Presencial" }[m] || m;
    }

    cargarEmpleos();
  </script>
</body>
</html>
