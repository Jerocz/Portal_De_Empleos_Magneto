<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magneto — Empleos</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="styles.css?v=2" />
</head>
<body>

  <!-- ▸ APP NAVBAR -->
  <nav class="app-nav">
    <a href="dashboard.html" class="app-brand">
      <div class="app-logo"><i class="fas fa-briefcase"></i></div>
      <span class="app-brand-name">Mag<span>neto</span></span>
    </a>
    <div class="app-links">
      <a href="dashboard.html"><i class="fas fa-house"></i> <span>Inicio</span></a>
      <a href="jobs.html" class="active"><i class="fas fa-magnifying-glass"></i> <span>Empleos</span></a>
      <a href="profile.html"><i class="fas fa-user"></i> <span>Mi Perfil</span></a>
      <button class="btn-logout" onclick="logout()"><i class="fas fa-right-from-bracket"></i> Salir</button>
    </div>
  </nav>

  <div class="app-container">

    <!-- Page hero -->
    <div class="page-hero">
      <div class="page-hero-content">
        <h2><i class="fas fa-magnifying-glass" style="opacity:.8;margin-right:10px"></i>Empleos disponibles</h2>
        <p>Explora todas las oportunidades publicadas en la plataforma</p>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters-bar">
      <input type="text" id="filtroCity" placeholder="🔍  Buscar por ciudad..." onkeyup="filtrar()" />
      <select id="filtroMod" onchange="filtrar()">
        <option value="">Todas las modalidades</option>
        <option value="remote">Remoto</option>
        <option value="hybrid">Híbrido</option>
        <option value="on-site">Presencial</option>
      </select>
      <button class="btn btn-ghost" onclick="limpiarFiltros()">
        <i class="fas fa-xmark"></i> Limpiar
      </button>
    </div>

    <p id="contador" class="results-count"></p>

    <div id="jobsContainer">
      <p class="text-muted"><i class="fas fa-spinner fa-spin"></i> &nbsp;Cargando empleos...</p>
    </div>

  </div>

  <script src="config.js"></script>
  <script>
    requireAuth();
    let todosLosEmpleos = [];

    function badgeMod(m) {
      const map = {
        remote:    `<span class="badge badge-remote"><i class="fas fa-wifi"></i> Remoto</span>`,
        hybrid:    `<span class="badge badge-hybrid"><i class="fas fa-arrows-left-right"></i> Híbrido</span>`,
        "on-site": `<span class="badge badge-onsite"><i class="fas fa-building"></i> Presencial</span>`,
      };
      return map[m] || `<span class="badge">${m}</span>`;
    }

    function formatSalary(min, max) {
      if (!min && !max) return null;
      const fmt = n => n.toLocaleString("es-CO");
      if (min && max) return `$${fmt(min)} – $${fmt(max)} COP`;
      if (min) return `Desde $${fmt(min)} COP`;
      return `Hasta $${fmt(max)} COP`;
    }

    async function cargarEmpleos() {
      const cont = document.getElementById("jobsContainer");
      try {
        todosLosEmpleos = await apiFetch("/jobs/");
        mostrarEmpleos(todosLosEmpleos);
      } catch (err) {
        cont.innerHTML = `<div class="msg msg-error"><i class="fas fa-circle-exclamation"></i> Error: ${err.message}</div>`;
      }
    }

    function mostrarEmpleos(lista) {
      const cont = document.getElementById("jobsContainer");
      const n = lista.length;
      document.getElementById("contador").innerHTML = n > 0
        ? `<i class="fas fa-briefcase" style="color:var(--teal-mid)"></i> &nbsp;<strong>${n}</strong> empleo${n !== 1 ? "s" : ""} encontrado${n !== 1 ? "s" : ""}`
        : "";

      if (n === 0) {
        cont.innerHTML = `
          <div class="empty-state">
            <span class="empty-icon">🔍</span>
            <h3>Sin resultados</h3>
            <p>No hay empleos que coincidan con esos filtros. Intenta con otros criterios.</p>
            <button class="btn btn-secondary" onclick="limpiarFiltros()">
              <i class="fas fa-rotate-left"></i> Ver todos
            </button>
          </div>`;
        return;
      }

      cont.innerHTML = `<div class="jobs-grid">${lista.map(j => {
        const salary = formatSalary(j.salary_min_cop, j.salary_max_cop);
        return `
          <div class="job-card">
            <div class="job-card-top">
              <div class="job-avatar">${j.company.charAt(0).toUpperCase()}</div>
              <div class="job-main">
                <h3>${j.title}</h3>
                <span class="job-company">
                  <i class="fas fa-building"></i> ${j.company}
                </span>
              </div>
            </div>
            <div class="job-details">
              <span><i class="fas fa-location-dot"></i> ${j.city}</span>
              ${badgeMod(j.modality)}
            </div>
            ${j.description ? `<p class="job-desc">${j.description}</p>` : ""}
            ${(j.skills_required || []).length > 0 ? `
              <div class="skills-row">
                ${j.skills_required.map(s => `<span class="skill-tag">${s}</span>`).join("")}
              </div>` : ""}
            <div class="job-card-footer">
              ${salary ? `<p class="job-salary"><i class="fas fa-peso-sign"></i> ${salary}</p>` : `<span></span>`}
              <button class="btn-apply" onclick="window.location.href='dashboard.html'">
                <i class="fas fa-paper-plane"></i> Ver match
              </button>
            </div>
          </div>`;
      }).join("")}</div>`;
    }

    function filtrar() {
      const ciudad = document.getElementById("filtroCity").value.toLowerCase();
      const mod = document.getElementById("filtroMod").value;
      mostrarEmpleos(todosLosEmpleos.filter(j => {
        return (!ciudad || j.city.toLowerCase().includes(ciudad))
            && (!mod    || j.modality === mod);
      }));
    }

    function limpiarFiltros() {
      document.getElementById("filtroCity").value = "";
      document.getElementById("filtroMod").value = "";
      mostrarEmpleos(todosLosEmpleos);
    }

    cargarEmpleos();
  </script>
</body>
</html>
