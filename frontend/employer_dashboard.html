<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magneto — Panel de Empresa</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="styles.css?v=2" />
</head>
<body>

  <!-- ▸ APP NAVBAR -->
  <nav class="app-nav">
    <a href="employer_dashboard.html" class="app-brand">
      <div class="app-logo"><i class="fas fa-briefcase"></i></div>
      <span class="app-brand-name">Mag<span>neto</span></span>
    </a>
    <div class="app-links">
      <a href="employer_dashboard.html" class="active"><i class="fas fa-building"></i> <span>Mis Vacantes</span></a>
      <a href="#inboxSection" onclick="toggleInbox()"><i class="fas fa-inbox"></i> <span>Postulaciones</span> <span id="inboxBadge" style="display:none;background:#dc2626;color:white;border-radius:999px;font-size:11px;padding:1px 7px;margin-left:2px"></span></a>
      <button class="btn-logout" onclick="logout()"><i class="fas fa-right-from-bracket"></i> Salir</button>
    </div>
  </nav>

  <div class="app-container">

    <!-- Welcome banner -->
    <div class="welcome-banner employer-banner">
      <div class="welcome-text">
        <h2 id="saludo">Panel de Empresa</h2>
        <p id="welcome-sub">Publica vacantes y gestiona tus ofertas activas</p>
      </div>
      <span class="employer-badge"><i class="fas fa-building"></i> Contratante</span>
    </div>

    <!-- ▸ FORM: publicar vacante -->
    <div class="card" id="publishSection">
      <div class="section-label" style="margin-bottom:20px">
        <i class="fas fa-plus-circle" style="color:var(--teal-mid)"></i> Publicar nueva vacante
      </div>

      <div id="publishMsg"></div>

      <form onsubmit="publicarEmpleo(event)">
        <div class="form-grid">
          <div class="field">
            <label><i class="fas fa-id-badge"></i> &nbsp;Título del cargo *</label>
            <input type="text" id="jobTitle" placeholder="Ej: Desarrollador Full Stack" required />
          </div>
          <div class="field">
            <label><i class="fas fa-building"></i> &nbsp;Empresa *</label>
            <input type="text" id="jobCompany" placeholder="Ej: TechCorp S.A.S" required />
          </div>
          <div class="field">
            <label><i class="fas fa-location-dot"></i> &nbsp;Ciudad</label>
            <input type="text" id="jobCity" placeholder="Ej: Medellín, Bogotá" />
          </div>
          <div class="field">
            <label><i class="fas fa-laptop-house"></i> &nbsp;Modalidad</label>
            <select id="jobModality">
              <option value="">— Selecciona —</option>
              <option value="remote">🌐 Remoto</option>
              <option value="hybrid">🔀 Híbrido</option>
              <option value="presencial">🏢 Presencial</option>
            </select>
          </div>
          <div class="field">
            <label><i class="fas fa-peso-sign"></i> &nbsp;Salario mínimo (COP)</label>
            <input type="number" id="jobSalMin" placeholder="Ej: 3000000" min="0" step="100000" />
          </div>
          <div class="field">
            <label><i class="fas fa-peso-sign"></i> &nbsp;Salario máximo (COP)</label>
            <input type="number" id="jobSalMax" placeholder="Ej: 8000000" min="0" step="100000" />
          </div>
        </div>

        <div class="field">
          <label><i class="fas fa-align-left"></i> &nbsp;Descripción del cargo</label>
          <textarea id="jobDesc" rows="3" placeholder="Describe responsabilidades, requisitos y beneficios del cargo..."></textarea>
        </div>

        <div class="field">
          <label><i class="fas fa-code"></i> &nbsp;Habilidades requeridas — <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--t3)">Escribe y presiona Enter o coma</span></label>
          <div class="skills-area" onclick="document.getElementById('skillInput').focus()">
            <div id="skillTags" style="display:contents"></div>
            <input type="text" id="skillInput" placeholder="python, react, sql..." onkeydown="agregarSkill(event)" />
          </div>
        </div>

        <button type="submit" class="btn btn-primary" style="margin-top:8px">
          <i class="fas fa-paper-plane"></i> Publicar vacante
        </button>
      </form>
    </div>

    <!-- ▸ MIS VACANTES -->
    <div class="section-label" style="margin: 28px 0 16px">
      <i class="fas fa-list-check" style="color:var(--teal-mid)"></i> Mis vacantes publicadas
    </div>

    <div id="myJobsContainer">
      <p class="text-muted"><i class="fas fa-spinner fa-spin"></i> &nbsp;Cargando...</p>
    </div>

    <!-- ▸ BANDEJA DE POSTULACIONES -->
    <div id="inboxSection" style="display:none;margin-top:32px">
      <div class="section-label" style="margin-bottom:16px">
        <i class="fas fa-inbox" style="color:var(--teal-mid)"></i> Postulaciones recibidas
        <span id="inboxCount" style="font-size:13px;font-weight:400;color:var(--t3);margin-left:8px"></span>
      </div>
      <div id="inboxContainer">
        <p class="text-muted"><i class="fas fa-spinner fa-spin"></i> &nbsp;Cargando...</p>
      </div>
    </div>

  </div>

  <script src="config.js"></script>
  <script>
    requireAuth();
    const user = getUser();
    if (user && user.role !== "employer") window.location.href = "dashboard.html";

    if (user) {
      const nombre = user.full_name.split(" ")[0];
      document.getElementById("saludo").textContent = `Hola, ${nombre}`;
    }

    let skills = [];

    function mostrarSkills() {
      document.getElementById("skillTags").innerHTML = skills.map((s, i) => `
        <span class="skill-tag">${s} <button type="button" onclick="quitarSkill(${i})">&times;</button></span>
      `).join("");
    }

    function quitarSkill(i) {
      skills.splice(i, 1);
      mostrarSkills();
    }

    function agregarSkill(e) {
      if (e.key === "Enter" || e.key === ",") {
        e.preventDefault();
        const input = document.getElementById("skillInput");
        const val = input.value.trim().replace(/,$/, "").toLowerCase();
        if (val && !skills.includes(val)) {
          skills.push(val);
          mostrarSkills();
        }
        input.value = "";
      }
    }

    function badgeMod(m) {
      const map = {
        remote:    `<span class="badge badge-remote"><i class="fas fa-wifi"></i> Remoto</span>`,
        hybrid:    `<span class="badge badge-hybrid"><i class="fas fa-arrows-left-right"></i> Híbrido</span>`,
        "presencial": `<span class="badge badge-onsite"><i class="fas fa-building"></i> Presencial</span>`,
      };
      return map[m] || (m ? `<span class="badge">${m}</span>` : "");
    }

    function formatSalary(min, max) {
      if (!min && !max) return null;
      const fmt = n => n.toLocaleString("es-CO");
      if (min && max) return `$${fmt(min)} – $${fmt(max)} COP`;
      if (min) return `Desde $${fmt(min)} COP`;
      return `Hasta $${fmt(max)} COP`;
    }

    async function publicarEmpleo(e) {
      e.preventDefault();
      const msgEl = document.getElementById("publishMsg");
      msgEl.innerHTML = `<div class="msg msg-info"><i class="fas fa-spinner fa-spin"></i> Publicando vacante...</div>`;

      try {
        await apiFetch("/jobs/", {
          method: "POST",
          body: JSON.stringify({
            title:          document.getElementById("jobTitle").value,
            company:        document.getElementById("jobCompany").value,
            city:           document.getElementById("jobCity").value || null,
            modality:       document.getElementById("jobModality").value || null,
            description:    document.getElementById("jobDesc").value || null,
            salary_min_cop: parseInt(document.getElementById("jobSalMin").value) || null,
            salary_max_cop: parseInt(document.getElementById("jobSalMax").value) || null,
            skills_required: skills,
          }),
        });

        msgEl.innerHTML = `<div class="msg msg-success"><i class="fas fa-circle-check"></i> Vacante publicada correctamente</div>`;
        // Reset form
        e.target.reset();
        skills = [];
        mostrarSkills();
        setTimeout(() => msgEl.innerHTML = "", 3000);
        cargarMisEmpleos();
      } catch (err) {
        msgEl.innerHTML = `<div class="msg msg-error"><i class="fas fa-circle-exclamation"></i> ${err.message}</div>`;
      }
    }

    async function cargarMisEmpleos() {
      const cont = document.getElementById("myJobsContainer");
      try {
        const jobs = await apiFetch("/jobs/my-jobs");

        const n = jobs.length;
        document.getElementById("welcome-sub").textContent =
          n > 0 ? `Tienes ${n} vacante${n > 1 ? "s" : ""} publicada${n > 1 ? "s" : ""}` : "Aún no has publicado vacantes";

        if (n === 0) {
          cont.innerHTML = `
            <div class="empty-state">
              <span class="empty-icon">📋</span>
              <h3>Sin vacantes publicadas</h3>
              <p>Usa el formulario de arriba para publicar tu primera oferta de empleo.</p>
            </div>`;
          return;
        }

        cont.innerHTML = `<div class="jobs-grid">${jobs.map(j => {
          const salary = formatSalary(j.salary_min_cop, j.salary_max_cop);
          return `
            <div class="job-card">
              <div class="job-card-top">
                <div class="job-avatar">${j.company.charAt(0).toUpperCase()}</div>
                <div class="job-main">
                  <h3>${j.title}</h3>
                  <span class="job-company"><i class="fas fa-building"></i> ${j.company}</span>
                </div>
              </div>
              <div class="job-details">
                ${j.city ? `<span><i class="fas fa-location-dot"></i> ${j.city}</span>` : ""}
                ${badgeMod(j.modality)}
              </div>
              ${j.description ? `<p class="job-desc">${j.description}</p>` : ""}
              ${(j.skills_required || []).length > 0 ? `
                <div class="skills-row">
                  ${j.skills_required.map(s => `<span class="skill-tag">${s}</span>`).join("")}
                </div>` : ""}
              <div class="job-card-footer">
                ${salary ? `<p class="job-salary"><i class="fas fa-peso-sign"></i> ${salary}</p>` : `<span></span>`}
                <span class="employer-job-tag"><i class="fas fa-circle-check"></i> Publicado</span>
                <button onclick="eliminarVacante(${j.id}, this)" style="background:none;border:1px solid #fca5a5;color:#dc2626;border-radius:8px;padding:5px 12px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:5px;transition:all .2s" onmouseover="this.style.background='#fef2f2'" onmouseout="this.style.background='none'"><i class="fas fa-trash-can"></i> Eliminar</button>
              </div>
            </div>`;
        }).join("")}</div>`;
      } catch (err) {
        cont.innerHTML = `<div class="msg msg-error"><i class="fas fa-circle-exclamation"></i> ${err.message}</div>`;
      }
    }

    async function eliminarVacante(jobId, btn) {
      if (!confirm("¿Seguro que quieres eliminar esta vacante? Esta acción no se puede deshacer.")) return;
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
      try {
        await apiFetch(`/jobs/${jobId}`, { method: "DELETE" });
        const card = btn.closest(".job-card");
        card.style.transition = "opacity .3s, transform .3s";
        card.style.opacity = "0";
        card.style.transform = "scale(0.95)";
        setTimeout(() => { card.remove(); cargarMisEmpleos(); }, 300);
      } catch (err) {
        alert("Error al eliminar: " + err.message);
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-trash-can"></i> Eliminar';
      }
    }

    // ── Bandeja de postulaciones ──
    function toggleInbox() {
      const sec = document.getElementById("inboxSection");
      const visible = sec.style.display !== "none";
      sec.style.display = visible ? "none" : "block";
      if (!visible) cargarInbox();
    }

    function statusBadge(status) {
      const map = {
        pending:  `<span style="background:#fef3c7;color:#d97706;border-radius:7px;padding:3px 9px;font-size:11px;font-weight:600">⏳ Pendiente</span>`,
        seen:     `<span style="background:#dbeafe;color:#1d4ed8;border-radius:7px;padding:3px 9px;font-size:11px;font-weight:600">👀 Visto</span>`,
        rejected: `<span style="background:#fee2e2;color:#dc2626;border-radius:7px;padding:3px 9px;font-size:11px;font-weight:600">✗ Rechazado</span>`,
      };
      return map[status] || status;
    }

    async function cambiarEstado(appId, status, btn) {
      btn.disabled = true;
      try {
        await apiFetch(`/applications/${appId}/status`, {
          method: "PATCH",
          body: JSON.stringify({ status }),
        });
        cargarInbox();
      } catch (err) {
        alert(err.message);
        btn.disabled = false;
      }
    }

    async function cargarInbox() {
      const cont = document.getElementById("inboxContainer");
      cont.innerHTML = `<p class="text-muted"><i class="fas fa-spinner fa-spin"></i> &nbsp;Cargando...</p>`;
      try {
        const apps = await apiFetch("/applications/inbox");

        // Badge en navbar
        const badge = document.getElementById("inboxBadge");
        const pending = apps.filter(a => a.status === "pending").length;
        badge.style.display = pending > 0 ? "inline" : "none";
        badge.textContent = pending;

        document.getElementById("inboxCount").textContent =
          apps.length > 0 ? `(${apps.length} postulación${apps.length > 1 ? "es" : ""})` : "";

        if (apps.length === 0) {
          cont.innerHTML = `
            <div class="empty-state">
              <span class="empty-icon">📬</span>
              <h3>Sin postulaciones todavía</h3>
              <p>Cuando un empleado se postule a tus vacantes, aparecerá aquí.</p>
            </div>`;
          return;
        }

        // Agrupar por vacante
        const byJob = {};
        apps.forEach(a => {
          if (!byJob[a.job_id]) byJob[a.job_id] = { title: a.job_title, company: a.company, apps: [] };
          byJob[a.job_id].apps.push(a);
        });

        cont.innerHTML = Object.entries(byJob).map(([jobId, group]) => `
          <div style="border:1.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px">
            <div style="background:var(--teal-pale);padding:12px 18px;border-bottom:1px solid var(--teal-border)">
              <strong style="color:var(--navy);font-size:14px"><i class="fas fa-briefcase" style="color:var(--teal-mid)"></i> ${group.title}</strong>
              <span style="font-size:12px;color:var(--t3);margin-left:8px">${group.company} · ${group.apps.length} candidato${group.apps.length > 1 ? "s" : ""}</span>
            </div>
            ${group.apps.map(a => `
              <div style="padding:16px 18px;border-bottom:1px solid var(--border);background:white">
                <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap">
                  <div>
                    <strong style="color:var(--navy);font-size:14px"><i class="fas fa-user-circle" style="color:var(--teal-mid)"></i> ${a.candidate_name}</strong>
                    <span style="display:block;font-size:12px;color:var(--t3);margin-top:2px"><i class="fas fa-envelope"></i> ${a.candidate_email}</span>
                  </div>
                  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                    ${statusBadge(a.status)}
                    <span style="font-size:11px;color:var(--t4)">${new Date(a.applied_at).toLocaleDateString("es-CO")}</span>
                  </div>
                </div>

                <!-- Info del perfil del candidato -->
                <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:10px">
                  ${a.location_city ? `<span style="font-size:12px;color:var(--t3)"><i class="fas fa-location-dot"></i> ${a.location_city}</span>` : ""}
                  ${a.candidate_modality ? `<span style="font-size:12px;color:var(--t3)"><i class="fas fa-laptop-house"></i> ${a.candidate_modality}</span>` : ""}
                  ${a.years_exp ? `<span style="font-size:12px;color:var(--t3)"><i class="fas fa-briefcase"></i> ${a.years_exp} año${a.years_exp > 1 ? "s" : ""} exp.</span>` : ""}
                  ${a.candidate_sal_min ? `<span style="font-size:12px;color:var(--t3)"><i class="fas fa-peso-sign"></i> ${(a.candidate_sal_min/1000).toFixed(0)}K – ${a.candidate_sal_max ? (a.candidate_sal_max/1000).toFixed(0)+"K" : "?"} COP</span>` : ""}
                </div>

                ${(a.skills || []).length > 0 ? `
                  <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px">
                    ${a.skills.map(s => `<span class="skill-tag">${s}</span>`).join("")}
                  </div>` : ""}

                ${a.message ? `<blockquote style="margin:10px 0 0;padding:8px 12px;border-left:3px solid var(--teal-mid);background:var(--teal-pale);border-radius:0 8px 8px 0;font-size:13px;color:var(--t2);font-style:italic">${a.message}</blockquote>` : ""}

                <!-- Acciones -->
                <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
                  ${a.status !== "seen" ? `<button onclick="cambiarEstado(${a.application_id},'seen',this)" style="background:#dbeafe;color:#1d4ed8;border:none;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:12px;font-weight:600"><i class="fas fa-eye"></i> Marcar visto</button>` : ""}
                  ${a.status !== "rejected" ? `<button onclick="cambiarEstado(${a.application_id},'rejected',this)" style="background:#fee2e2;color:#dc2626;border:none;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:12px;font-weight:600"><i class="fas fa-xmark"></i> Rechazar</button>` : ""}
                  ${a.status !== "pending" ? `<button onclick="cambiarEstado(${a.application_id},'pending',this)" style="background:#f3f4f6;color:#6b7280;border:none;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:12px;font-weight:600"><i class="fas fa-rotate-left"></i> Pendiente</button>` : ""}
                </div>
              </div>
            `).join("")}
          </div>
        `).join("");

      } catch (err) {
        cont.innerHTML = `<div class="msg msg-error"><i class="fas fa-circle-exclamation"></i> ${err.message}</div>`;
      }
    }

    cargarMisEmpleos();
    cargarInbox();
  </script>
</body>
</html>
