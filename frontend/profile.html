<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Magneto - Mi Perfil</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <nav>
    <div class="brand">Magneto Empleos</div>
    <div class="links">
      <a href="dashboard.html">Inicio</a>
      <a href="jobs.html">Empleos</a>
      <a href="profile.html">Mi Perfil</a>
      <button onclick="logout()">Salir</button>
    </div>
  </nav>

  <div class="container">

    <h2 style="margin-bottom: 4px;">Mi Perfil</h2>
    <p class="text-muted" style="margin-bottom: 20px;">Mantén tu perfil actualizado para obtener mejores matches</p>

    <div class="card">

      <div class="perfil-header">
        <div class="avatar" id="avatar">?</div>
        <div>
          <strong id="nombreUsuario">...</strong><br>
          <span class="text-muted" id="emailUsuario">...</span>
        </div>
      </div>

      <div id="perfilMsg"></div>

      <form onsubmit="guardarPerfil(event)">

        <div class="form-grid">
          <div class="field">
            <label>Ciudad</label>
            <input type="text" id="ciudad" placeholder="Ej: Medellín, Bogotá" />
          </div>
          <div class="field">
            <label>Modalidad preferida</label>
            <select id="modalidad">
              <option value="">-- Selecciona --</option>
              <option value="remote">Remoto</option>
              <option value="hybrid">Híbrido</option>
              <option value="on-site">Presencial</option>
            </select>
          </div>
          <div class="field">
            <label>Salario mínimo (COP)</label>
            <input type="number" id="salMin" placeholder="Ej: 3000000" min="0" step="100000" />
          </div>
          <div class="field">
            <label>Salario máximo (COP)</label>
            <input type="number" id="salMax" placeholder="Ej: 8000000" min="0" step="100000" />
          </div>
          <div class="field">
            <label>Años de experiencia</label>
            <input type="number" id="exp" placeholder="Ej: 2" min="0" max="50" />
          </div>
        </div>

        <div class="field">
          <label>Skills</label>
          <p class="text-muted" style="margin-bottom: 6px;">Escribe una skill y presiona Enter o coma</p>
          <div class="skills-area" onclick="document.getElementById('skillInput').focus()">
            <div id="skillTags"></div>
            <input type="text" id="skillInput" placeholder="python, sql, react..." onkeydown="agregarSkill(event)" />
          </div>
        </div>

        <button type="submit" class="btn btn-primary mt-10">Guardar perfil</button>
      </form>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    requireAuth();
    const user = getUser();
    let skills = [];

    if (user) {
      document.getElementById("nombreUsuario").textContent = user.full_name;
      document.getElementById("emailUsuario").textContent = user.email;
      document.getElementById("avatar").textContent = user.full_name.charAt(0).toUpperCase();
    }

    async function cargarPerfil() {
      try {
        const data = await apiFetch("/profile/");
        const p = data.profile;
        if (p) {
          document.getElementById("ciudad").value = p.location_city || "";
          document.getElementById("modalidad").value = p.modality || "";
          document.getElementById("salMin").value = p.salary_min_cop || "";
          document.getElementById("salMax").value = p.salary_max_cop || "";
          document.getElementById("exp").value = p.years_exp || "";
          skills = p.skills || [];
          mostrarSkills();
        }
      } catch (err) {
        console.error("Error cargando perfil:", err.message);
      }
    }

    function mostrarSkills() {
      document.getElementById("skillTags").innerHTML = skills.map((s, i) => `
        <span class="skill-tag">${s} <button type="button" onclick="quitarSkill(${i})">x</button></span>
      `).join("");
    }

    function quitarSkill(i) {
      skills.splice(i, 1);
      mostrarSkills();
    }

    function agregarSkill(e) {
      if (e.key === "Enter" || e.key === ",") {
        e.preventDefault();
        const input = document.getElementById("skillInput");
        const val = input.value.trim().replace(/,$/, "").toLowerCase();
        if (val && !skills.includes(val)) {
          skills.push(val);
          mostrarSkills();
        }
        input.value = "";
      }
    }

    async function guardarPerfil(e) {
      e.preventDefault();
      const msgEl = document.getElementById("perfilMsg");
      msgEl.innerHTML = `<div class="msg msg-info">Guardando...</div>`;
      try {
        await apiFetch("/profile/", {
          method: "PUT",
          body: JSON.stringify({
            location_city: document.getElementById("ciudad").value || null,
            modality: document.getElementById("modalidad").value || null,
            salary_min_cop: parseInt(document.getElementById("salMin").value) || null,
            salary_max_cop: parseInt(document.getElementById("salMax").value) || null,
            years_exp: parseInt(document.getElementById("exp").value) || null,
            skills: skills,
          }),
        });
        msgEl.innerHTML = `<div class="msg msg-success">Perfil guardado correctamente</div>`;
      } catch (err) {
        msgEl.innerHTML = `<div class="msg msg-error">${err.message}</div>`;
      }
      setTimeout(() => msgEl.innerHTML = "", 3000);
    }

    cargarPerfil();
  </script>
</body>
</html>
