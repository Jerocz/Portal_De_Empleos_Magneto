<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magneto — Mi Perfil</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ▸ APP NAVBAR -->
  <nav class="app-nav">
    <a href="dashboard.html" class="app-brand">
      <div class="app-logo"><i class="fas fa-briefcase"></i></div>
      <span class="app-brand-name">Mag<span>neto</span></span>
    </a>
    <div class="app-links">
      <a href="dashboard.html"><i class="fas fa-house"></i> <span>Inicio</span></a>
      <a href="jobs.html"><i class="fas fa-magnifying-glass"></i> <span>Empleos</span></a>
      <a href="profile.html" class="active"><i class="fas fa-user"></i> <span>Mi Perfil</span></a>
      <button class="btn-logout" onclick="logout()"><i class="fas fa-right-from-bracket"></i> Salir</button>
    </div>
  </nav>

  <div class="app-container">

    <!-- Page hero -->
    <div class="page-hero">
      <div class="page-hero-content">
        <h2><i class="fas fa-user" style="opacity:.8;margin-right:10px"></i>Mi Perfil</h2>
        <p>Cuanto más completo esté tu perfil, mejores serán tus matches</p>
      </div>
    </div>

    <div class="card">

      <!-- Profile header -->
      <div class="perfil-header">
        <div class="avatar" id="avatar">?</div>
        <div class="perfil-info">
          <strong id="nombreUsuario">Cargando...</strong>
          <span id="emailUsuario"></span>
        </div>
      </div>

      <div id="perfilMsg"></div>

      <form onsubmit="guardarPerfil(event)">

        <div class="section-label" style="margin-bottom:20px">
          <i class="fas fa-sliders" style="color:var(--teal-mid)"></i> Preferencias de trabajo
        </div>

        <div class="form-grid">
          <div class="field">
            <label><i class="fas fa-location-dot"></i> &nbsp;Ciudad</label>
            <input type="text" id="ciudad" placeholder="Ej: Medellín, Bogotá" />
          </div>
          <div class="field">
            <label><i class="fas fa-laptop-house"></i> &nbsp;Modalidad preferida</label>
            <select id="modalidad">
              <option value="">— Selecciona —</option>
              <option value="remote">🌐 Remoto</option>
              <option value="hybrid">🔀 Híbrido</option>
              <option value="on-site">🏢 Presencial</option>
            </select>
          </div>
          <div class="field">
            <label><i class="fas fa-peso-sign"></i> &nbsp;Salario mínimo (COP)</label>
            <input type="number" id="salMin" placeholder="Ej: 3000000" min="0" step="100000" />
          </div>
          <div class="field">
            <label><i class="fas fa-peso-sign"></i> &nbsp;Salario máximo (COP)</label>
            <input type="number" id="salMax" placeholder="Ej: 8000000" min="0" step="100000" />
          </div>
          <div class="field">
            <label><i class="fas fa-briefcase"></i> &nbsp;Años de experiencia</label>
            <input type="number" id="exp" placeholder="Ej: 2" min="0" max="50" />
          </div>
        </div>

        <div class="section-label" style="margin: 24px 0 20px">
          <i class="fas fa-code" style="color:var(--teal-mid)"></i> Habilidades técnicas
        </div>

        <div class="field">
          <label>Skills — <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--t3)">Escribe y presiona Enter o coma para agregar</span></label>
          <div class="skills-area" onclick="document.getElementById('skillInput').focus()">
            <div id="skillTags" style="display:contents"></div>
            <input type="text" id="skillInput" placeholder="python, sql, react, node..." onkeydown="agregarSkill(event)" />
          </div>
        </div>

        <button type="submit" class="btn btn-primary" style="margin-top:8px">
          <i class="fas fa-floppy-disk"></i> Guardar perfil
        </button>

      </form>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    requireAuth();
    const user = getUser();
    let skills = [];

    if (user) {
      document.getElementById("nombreUsuario").textContent = user.full_name;
      document.getElementById("emailUsuario").textContent = user.email;
      document.getElementById("avatar").textContent = user.full_name.charAt(0).toUpperCase();
    }

    async function cargarPerfil() {
      try {
        const data = await apiFetch("/profile/");
        const p = data.profile;
        if (p) {
          document.getElementById("ciudad").value    = p.location_city || "";
          document.getElementById("modalidad").value = p.modality      || "";
          document.getElementById("salMin").value    = p.salary_min_cop || "";
          document.getElementById("salMax").value    = p.salary_max_cop || "";
          document.getElementById("exp").value       = p.years_exp      || "";
          skills = p.skills || [];
          mostrarSkills();
        }
      } catch (err) {
        console.error("Error cargando perfil:", err.message);
      }
    }

    function mostrarSkills() {
      document.getElementById("skillTags").innerHTML = skills.map((s, i) => `
        <span class="skill-tag">${s} <button type="button" onclick="quitarSkill(${i})">&times;</button></span>
      `).join("");
    }

    function quitarSkill(i) {
      skills.splice(i, 1);
      mostrarSkills();
    }

    function agregarSkill(e) {
      if (e.key === "Enter" || e.key === ",") {
        e.preventDefault();
        const input = document.getElementById("skillInput");
        const val = input.value.trim().replace(/,$/, "").toLowerCase();
        if (val && !skills.includes(val)) {
          skills.push(val);
          mostrarSkills();
        }
        input.value = "";
      }
    }

    async function guardarPerfil(e) {
      e.preventDefault();
      const msgEl = document.getElementById("perfilMsg");
      msgEl.innerHTML = `<div class="msg msg-info"><i class="fas fa-spinner fa-spin"></i> Guardando...</div>`;
      try {
        await apiFetch("/profile/", {
          method: "PUT",
          body: JSON.stringify({
            location_city:  document.getElementById("ciudad").value   || null,
            modality:       document.getElementById("modalidad").value || null,
            salary_min_cop: parseInt(document.getElementById("salMin").value) || null,
            salary_max_cop: parseInt(document.getElementById("salMax").value) || null,
            years_exp:      parseInt(document.getElementById("exp").value)    || null,
            skills,
          }),
        });
        msgEl.innerHTML = `<div class="msg msg-success"><i class="fas fa-circle-check"></i> Perfil guardado correctamente</div>`;
      } catch (err) {
        msgEl.innerHTML = `<div class="msg msg-error"><i class="fas fa-circle-exclamation"></i> ${err.message}</div>`;
      }
      setTimeout(() => msgEl.innerHTML = "", 3000);
    }

    cargarPerfil();
  </script>
</body>
</html>
