<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Magneto - Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <nav>
    <div class="brand">Magneto Empleos</div>
    <div class="links">
      <a href="dashboard.html">Inicio</a>
      <a href="jobs.html">Empleos</a>
      <a href="profile.html">Mi Perfil</a>
      <button onclick="logout()">Salir</button>
    </div>
  </nav>

  <div class="container">

    <h2 id="saludo">Hola!</h2>
    <p class="text-muted" style="margin-bottom: 16px;">Estos son tus mejores matches</p>

    <div style="margin-bottom: 14px; display: flex; gap: 10px; flex-wrap: wrap;">
      <button class="btn btn-primary" onclick="buscarMatches()">Buscar matches</button>
      <button class="btn btn-secondary" onclick="toggleNotif()">Notificaciones</button>
    </div>

    <div id="matchStatus"></div>

    <!-- Panel de notificaciones -->
    <div id="notifPanel" class="card hidden">
      <h3 style="margin-bottom: 12px; font-size: 15px;">Notificaciones</h3>
      <div id="notifLista"><p class="text-muted">Sin notificaciones.</p></div>
    </div>

    <!-- Matches -->
    <div id="matchesContainer">
      <p class="text-muted">Cargando...</p>
    </div>

  </div>

  <script src="config.js"></script>
  <script>
    requireAuth();
    const user = getUser();
    if (user) document.getElementById("saludo").textContent = "Hola, " + user.full_name.split(" ")[0] + "!";

    function claseScore(s) {
      if (s >= 80) return "score-alto";
      if (s >= 50) return "score-medio";
      return "score-bajo";
    }

    async function cargarMatches() {
      const cont = document.getElementById("matchesContainer");
      try {
        const matches = await apiFetch("/matches/");
        if (matches.length === 0) {
          cont.innerHTML = `<div class="card text-center"><p>No tienes matches todavía.</p><p class="text-muted">Completa tu <a href="profile.html">perfil</a> y haz clic en "Buscar matches".</p></div>`;
          return;
        }
        cont.innerHTML = matches.map(m => `
          <div class="match-card">
            <div class="score ${claseScore(m.score)}">${m.score}%</div>
            <h3>${m.title}</h3>
            <span class="company">${m.company}</span>
            <p class="meta">📍 ${m.city} · ${m.modality}</p>
            <p class="explanation">${m.explanation}</p>
            <p class="salary">💰 $${m.salary_min_cop?.toLocaleString()} – $${m.salary_max_cop?.toLocaleString()} COP</p>
            <div class="skills-row">
              ${(m.skills_required || []).map(s => `<span class="skill-tag">${s}</span>`).join("")}
            </div>
          </div>
        `).join("");
      } catch (err) {
        cont.innerHTML = `<div class="msg msg-error">Error: ${err.message}</div>`;
      }
    }

    async function cargarNotificaciones() {
      try {
        const data = await apiFetch("/notifications/");
        const lista = document.getElementById("notifLista");
        if (data.total > 0) {
          lista.innerHTML = data.notificaciones.map(n => `
            <div class="notif-item">
              <strong>${n.titulo} — <span class="${claseScore(n.score)}">${n.score}%</span></strong>
              <span>${n.mensaje}</span>
              <small>📍 ${n.ciudad} · ${n.modalidad} · ${n.fecha}</small>
            </div>
          `).join("");
        } else {
          lista.innerHTML = `<p class="text-muted">Sin notificaciones. Busca matches primero.</p>`;
        }
      } catch (e) {}
    }

    async function buscarMatches() {
      const statusEl = document.getElementById("matchStatus");
      statusEl.innerHTML = `<div class="msg msg-info">Buscando matches...</div>`;
      try {
        const data = await apiFetch("/matches/run", { method: "POST" });
        statusEl.innerHTML = `<div class="msg msg-success">${data.message}</div>`;
        await cargarMatches();
        await cargarNotificaciones();
      } catch (err) {
        statusEl.innerHTML = `<div class="msg msg-error">${err.message}</div>`;
      }
      setTimeout(() => statusEl.innerHTML = "", 4000);
    }

    function toggleNotif() {
      document.getElementById("notifPanel").classList.toggle("hidden");
    }

    cargarMatches();
    cargarNotificaciones();
  </script>
</body>
</html>
